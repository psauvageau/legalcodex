<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LegalCodex</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app" :class="['app', { 'app-chat': viewState === 'authenticated' }]">
      <section v-if="viewState === 'loading'" class="card">
        <h1>LegalCodex</h1>
        <p>Checking session…</p>
      </section>

      <section v-else-if="viewState === 'unauthenticated'" class="card">
        <h1>LegalCodex</h1>

        <form @submit.prevent="submitLogin" class="form">
          <label for="username">Username</label>
          <input
            id="username"
            v-model.trim="form.username"
            @input="clearError"
            autocomplete="username"
            required
          />

          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            v-model="form.password"
            @input="clearError"
            autocomplete="current-password"
            required
          />

          <p v-if="errorMessage" class="error">{{ errorMessage }}</p>

          <button type="submit" :disabled="isSubmitting">
            {{ isSubmitting ? 'Signing in…' : 'Sign in' }}
          </button>
        </form>
      </section>

      <section v-else class="chat-shell">
        <header class="chat-header">
          <button
            class="chat-sidebar-toggle"
            @click="toggleSidebar"
            :disabled="isSending"
            :aria-label="sidebarOpen ? 'Close sessions panel' : 'Open sessions panel'"
            :aria-expanded="sidebarOpen ? 'true' : 'false'"
            aria-controls="chat-sidebar"
          >
            ☰
          </button>
          <h1>LegalCodex</h1>
          <button @click="submitLogout" :disabled="isSubmitting" aria-label="Sign out">
            {{ isSubmitting ? 'Signing out…' : 'Sign out' }}
          </button>
        </header>

        <!-- Main two-column workspace: left session panel + right conversation area -->
        <div :class="['chat-body', { 'chat-body--sidebar-hidden': !sidebarOpen }]">
          <button
            type="button"
            class="chat-sidebar-backdrop"
            :class="{ 'chat-sidebar-backdrop--open': sidebarOpen }"
            @click="closeSidebar"
            aria-label="Close sessions panel"
          ></button>

          <aside
            id="chat-sidebar"
            class="chat-sidebar"
            :class="{ 'chat-sidebar--open': sidebarOpen }"
            aria-label="Chat sessions"
          >
            <button
              @click="createSession"
              :disabled="isSending || isSubmitting"
              aria-label="Create new session"
            >
              + New session
            </button>
            <ul class="chat-session-list" role="list" aria-label="Session list">
              <li
                v-for="s in sessions"
                :key="s.session_id"
                :class="{ active: s.session_id === currentSessionId }"
              >
                <button
                  type="button"
                  class="chat-session-button"
                  :class="{ active: s.session_id === currentSessionId }"
                  :aria-current="s.session_id === currentSessionId ? 'true' : null"
                  :aria-label="`Open session ${s.description || s.session_id}`"
                  @click="openSession(s.session_id)"
                >
                  {{ s.description || s.session_id }}
                </button>
              </li>
              <li v-if="!sessions.length">No sessions yet</li>
            </ul>
            <div v-if="currentSessionId" class="chat-session-actions">
              <button
                @click="resetSession"
                :disabled="isSending || isSubmitting"
                aria-label="Reset current session"
              >
                Reset session
              </button>
              <button
                @click="closeSession"
                :disabled="isSending || isSubmitting"
                aria-label="Close current session"
              >
                Close session
              </button>
            </div>
          </aside>

          <!-- Right column card: conversation timeline + message composer -->
          <div class="chat-main">
            <p v-if="chatToast" class="chat-toast" role="status" aria-live="polite">{{ chatToast }}</p>

            <!-- Scrollable conversation viewport (chat transcript appears here) -->
            <div class="chat-messages" ref="messagesContainer">
              <template v-if="messages.length">
                <article
                  v-for="m in messages"
                  :key="m.id"
                  :class="['chat-message', `chat-message--${m.role}`]"
                >
                  <header class="chat-message-meta">
                    <strong>{{ formatRole(m.role) }}</strong>
                    <time>{{ formatTimestamp(m.timestampMs) }}</time>
                  </header>
                  <div
                    class="chat-message-content"
                    @click="onMessageContentClick"
                    v-html="m.rendered"
                  ></div>
                </article>
              </template>
              <p v-else class="chat-empty">
                Start the conversation. Press Enter to send and Shift+Enter for a new line.
              </p>
            </div>

            <!-- Composer row: message textarea on the left, Send action on the right -->
            <div class="chat-input-bar">
              <textarea
                v-model="draft"
                :disabled="isSending"
                placeholder="Type a message…"
                aria-label="Chat message"
                @keydown.enter.exact.prevent="sendMessage"
                rows="1"
              ></textarea>
              <button
                @click="sendMessage"
                :disabled="isSending || !draft.trim()"
                aria-label="Send message"
              >
                Send
              </button>
            </div>
            <p v-if="chatError" class="chat-error">{{ chatError }}</p>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/js/auth-app.js"></script>
  </body>
</html>
