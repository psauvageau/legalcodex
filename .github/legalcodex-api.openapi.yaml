openapi: 3.0.3
info:
  title: LegalCodex API
  description: >
    RESTful API for legal document processing and analysis.
    The API supports session-based authentication via HTTP-only cookies.
  version: 1.0.0
  contact:
    name: LegalCodex Project
  license:
    name: Apache 2.0

servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
  - url: https://api.legalcodex.example.com/api/v1
    description: Production server (example)

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Status
    description: Server health and status information
  - name: Chat
    description: Manage chat sessions and exchange messages

paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate user and establish session
      description: >
        Accepts username and password credentials and returns a session cookie.
        The session cookie (`lc_access`) contains a JWT with the user's roles,
        is set as HTTP-only with SameSite=Lax, scoped to `/api/v1`, and has a
        Max-Age of 1800 seconds.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: sauvp
              password: hello
      responses:
        '204':
          description: Login successful; session cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
              description: >
                HTTP-only JWT session cookie (lc_access) with SameSite=Lax,
                Path=/api/v1, and Max-Age=1800 seconds.
              example: lc_access=eyJhbGciOi...; Path=/api/v1; HttpOnly; SameSite=lax; Max-Age=1800
        '401':
          description: Invalid username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: Unauthorized

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: End user session
      description: >
        Clears the session cookie (lc_access) and ends the authenticated session.
        The cookie Max-Age is set to 0 to expire it immediately.
      operationId: logoutUser
      responses:
        '204':
          description: Logout successful; session cookie cleared
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Expired session cookie (lc_access=; Max-Age=0)
              example: lc_access=; Path=/api/v1; Max-Age=0; HttpOnly; SameSite=lax
      security: []

  /auth/session:
    get:
      tags:
        - Authentication
      summary: Check authentication status
      description: >
        Returns the current authentication status.
        Returns 200 with authenticated=true (plus username and roles) if a valid
        session cookie is present, otherwise returns 401 with authenticated=false.
      operationId: checkSession
      responses:
        '200':
          description: User is authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
              example:
                authenticated: true
                username: sauvp
                roles:
                  - admin
                  - user
        '401':
          description: User is not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
              example:
                authenticated: false
      security: []

  /chat/sessions:
    get:
      tags:
        - Chat
      summary: List chat sessions
      description: Return all chat sessions for the authenticated user.
      operationId: listChatSessions
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Sessions retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionInfo'
              example:
                - session_id: 123e4567-e89b-12d3-a456-426614174000
                  description: Initial brainstorming
                - session_id: 123e4567-e89b-12d3-a456-426614174001
                  description: Contract review

    post:
      tags:
        - Chat
      summary: Create or open a chat session
      description: >
        Create a new chat session or open an existing one by ID for the
        authenticated user. Returns 201 when a new session is created and 200
        when an existing session is re-opened.
      operationId: createChatSession
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
            example:
              session_id: null
              engine: openai
              model: gpt-4o-mini
              max_messages: 20
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
        '200':
          description: Existing session opened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: Invalid session engine
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: Session does not exist

  /chat/sessions/{session_id}/context:
    get:
      tags:
        - Chat
      summary: Get chat context
      description: >
        Retrieve only the chat context for a session (system prompt, summary,
        and history). Session metadata such as uid, username, created_at, and
        engine configuration is not returned by this endpoint.
      operationId: getChatContext
      security:
        - cookieAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Context retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatContext'
              example:
                system_prompt: You are a legal assistant.
                max_messages: 20
                trim_length: 10
                summary: ''
                history:
                  - role: user
                    content: Summarize this NDA in 3 bullets.
                  - role: assistant
                    content: 1) ... 2) ... 3) ...
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: Session does not exist

  /chat/sessions/{session_id}/messages:
    post:
      tags:
        - Chat
      summary: Send a message to a chat session
      description: Send a message and return the assistant response as a single string.
      operationId: sendChatMessage
      security:
        - cookieAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageRequest'
            example:
              message: "Summarize this NDA in 3 bullets."
      responses:
        '200':
          description: Message processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                response: "1) ... 2) ... 3) ..."
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: Session is closed

  /chat/sessions/{session_id}/reset:
    post:
      tags:
        - Chat
      summary: Reset chat context
      description: Clear the history and summary for the specified chat session.
      operationId: resetChatContext
      security:
        - cookieAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Context reset
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat/sessions/{session_id}/close:
    post:
      tags:
        - Chat
      summary: Close chat session
      description: Close the specified chat session.
      operationId: closeChatSession
      security:
        - cookieAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session closed
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: Session does not exist

  /status:
    get:
      tags:
        - Status
      summary: Get server status
      description: >
        Returns the current server status and health information,
        including the current working directory and ISO 8601 UTC timestamp.
      operationId: getStatus
      responses:
        '200':
          description: Server status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              example:
                status: ok
                message: LegalCodex HTTP API server is running
                cwd: /home/user/legalcodex
                timestamp_utc: '2026-02-21T14:30:45.123456Z'

components:
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
          description: User identifier
          example: sauvp
        password:
          type: string
          minLength: 1
          description: User password (plain text in request)
          example: hello

    SessionResponse:
      type: object
      required:
        - authenticated
      properties:
        authenticated:
          type: boolean
          description: Whether the user has an active authenticated session
          example: true
        username:
          type: string
          nullable: true
          description: Username associated with the session
          example: sauvp
        roles:
          type: array
          items:
            type: string
          nullable: true
          description: Security groups associated with the user
          example:
            - admin
            - user

    StatusResponse:
      type: object
      required:
        - status
        - message
        - cwd
        - timestamp_utc
      properties:
        status:
          type: string
          description: Server status indicator
          enum:
            - ok
          example: ok
        message:
          type: string
          description: Human-readable status message
          example: LegalCodex HTTP API server is running
        cwd:
          type: string
          description: Current working directory of the server process
          example: /home/user/legalcodex
        timestamp_utc:
          type: string
          format: date-time
          description: ISO 8601 UTC timestamp when status was retrieved
          example: '2026-02-21T14:30:45.123456Z'

    ErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: Error message describing the issue
          example: Unauthorized

    SessionInfo:
      type: object
      required:
        - session_id
      properties:
        session_id:
          type: string
          description: Unique identifier for the chat session
          example: 123e4567-e89b-12d3-a456-426614174000
        description:
          type: string
          nullable: true
          description: Optional description of the chat session
          example: Contract review notes

    CreateSessionRequest:
      type: object
      properties:
        session_id:
          type: string
          nullable: true
          description: Existing session ID to reopen; omit to create a new session
        engine:
          type: string
          nullable: true
          description: Engine name to use for the session (e.g., openai)
          example: openai
        model:
          type: string
          nullable: true
          description: Model name to use with the engine
          example: gpt-4o-mini
        max_messages:
          type: integer
          nullable: true
          description: Maximum messages to keep before trimming
          example: 20

    MessageRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: User message to send to the chat session
          example: "Summarize this NDA in 3 bullets."

    MessageResponse:
      type: object
      required:
        - response
      properties:
        response:
          type: string
          description: Assistant response returned as a single string
          example: "1) ... 2) ... 3) ..."

    ChatMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - system
            - user
            - assistant
            - tool
          description: Role of the message sender
        content:
          type: string
          description: Message text content

    ChatContext:
      type: object
      required:
        - system_prompt
        - max_messages
        - trim_length
        - summary
        - history
      properties:
        system_prompt:
          type: string
          description: System prompt that sets the conversation context
        max_messages:
          type: integer
          description: Maximum number of messages to keep before trimming
        trim_length:
          type: integer
          description: Number of messages removed when trimming
        summary:
          type: string
          description: Summary of trimmed messages
        history:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          description: Conversation history excluding the system prompt and summary

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: lc_access
      description: >
        HTTP-only JWT session cookie set after successful login. Scoped to
        /api/v1 paths with SameSite=Lax and Max-Age=1800 seconds.

security: []
